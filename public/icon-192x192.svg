<svg width="192" height="192" viewBox="0 0 192 192" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="networkGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="192" height="192" rx="24" fill="url(#bgGradient)"/>
  
  <!-- Network nodes and connections -->
  <g filter="url(#glow)">
    <!-- Center node (switch/router) -->
    <circle cx="96" cy="96" r="20" fill="url(#networkGradient)"/>
    
    <!-- Top node (PC) -->
    <circle cx="96" cy="50" r="14" fill="#06b6d4"/>
    <line x1="96" y1="70" x2="96" y2="76" stroke="#06b6d4" stroke-width="3"/>
    
    <!-- Bottom left node (PC) -->
    <circle cx="56" cy="130" r="14" fill="#3b82f6"/>
    <line x1="76" y1="116" x2="82" y2="110" stroke="#3b82f6" stroke-width="3"/>
    
    <!-- Bottom right node (PC) -->
    <circle cx="136" cy="130" r="14" fill="#8b5cf6"/>
    <line x1="116" y1="116" x2="110" y2="110" stroke="#8b5cf6" stroke-width="3"/>
    
    <!-- Connection lines -->
    <line x1="96" y1="76" x2="96" y2="76" stroke="url(#networkGradient)" stroke-width="3" opacity="0.3"/>
    <line x1="82" y1="110" x2="82" y2="110" stroke="url(#networkGradient)" stroke-width="3" opacity="0.3"/>
    <line x1="110" y1="110" x2="110" y2="110" stroke="url(#networkGradient)" stroke-width="3" opacity="0.3"/>
  </g>
  
  <!-- Text "N" for Network -->
  <text x="96" y="104" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">N</text>
</svg>
